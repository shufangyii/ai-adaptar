model_list:
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 1000 # 独立 QPS (请求/分钟)
      timeout: 30
      max_retries: 3
      weight: 0.6
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: azure/chatgpt-35-turbo
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-02-15-preview"
      rpm: 1000
      timeout: 30
      max_retries: 3
      weight: 0.4

router_settings:
  routing_strategy: usage-based-routing-v2 # LiteLLM 推荐的高可用路由
  enable_pre_call_checks: true

litellm_settings:
  drop_params: true
  set_verbose: true
  # 强制大模型在 stream 结束时返回 Token 消耗 (支持 OpenAI 规范)
  stream_options: {"include_usage": true}
