model_list:
  - model_name: glm-4.7-flash
    litellm_params:
      model: openai/GLM-4.7-Flash
      api_base: os.environ/ZHIPU_API_BASE
      api_key: os.environ/ZHIPU_API_KEY
      rpm: 1000
      timeout: 60
      max_retries: 3

  - model_name: 'qwen3.5_4b'
    litellm_params:
      model: 'ollama_chat/qwen3.5:4b'
      api_base: 'http://192.168.10.2:11434'
      keep_alive: '10m'
    model_info:
      supports_function_calling: true

router_settings:
  routing_strategy: usage-based-routing-v2 # LiteLLM 推荐的高可用路由
  enable_pre_call_checks: true

litellm_settings:
  drop_params: true
  # 强制大模型在 stream 结束时返回 Token 消耗 (支持 OpenAI 规范)
  stream_options: { 'include_usage': true }
